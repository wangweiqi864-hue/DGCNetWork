// 魔法广播礼物消息房间
message MagicGiftBroadcast {
	sint64 id = 1;	// 发送者id
	string name =2; // 发送者名称
	uint32 gift_id = 3;	// 礼物id
    uint32 gift_num = 4;
    string receive_name = 5;  // 接收者名称
    sint64 receive_id = 6;  // 接收者id
	int32 effect_id = 7;	// 特效Id
    string effect_name = 8;
	repeated int32 timeout = 9;	// 结束时间 [年,月, 日, 时, 分, 秒]
    // 发送者爵位信息
    //RoomNobilityInfo send_nobility = 10;
    // 接受者爵位信息
    //RoomNobilityInfo receive_nobility = 11;
}

message GetGiftChangeNoticeReq {
}

message GetGiftChangeNoticeRes {
}


message BuyGiftReq {
    sint32 gift_id = 1;
    sint32 amount = 2;
}
message BuyGiftRes {
}

message GiftInsertItem {
  string icon = 1;
  string name = 2;
  string desc = 3;
  int32 position = 4;
  string jump = 5;
}

message GiftClassify{
    int32 id = 1; // 类别id
    string name = 2; // 类别名称
    int32 sort =  3; // 权重
    bool is_bag = 4; // 是否在背包显示
    bool is_default = 5; // 是否默认显示的分类
    GiftShowPlace show_place = 6; // 显示地方
    // 第一次打开前是否有红点
    bool have_red = 7;
    // 分类banner
    string banner_url = 8; //标题页面 H5地址 @since V1.4.0
    // 在当前分类中插入一些模块
    repeated GiftInsertItem gift_insert_items = 9;
}

enum GiftShowPlace {
    None = 0;      // 占位
    Room = 1;      // 房间
    Im = 2;        // im
}

message GiftBox {
    int32 gift_id = 1; 				// 礼物id
    string gift_name = 2;			// 礼物名称
    int32 gift_num = 3;				// 礼物数量
}

// 广播ID 400103
message GiftComboEndNotify{
  int64  player_id = 1;
  string nick = 2;
  string icon = 3;
  int64  gift_id = 4;
  int64  combo_num = 5;
  int64   combo_gold = 6;
  repeated common.Effect effect = 7; //发送者身上佩戴的特权
  bool isNewPlayer = 8;//是否新用户
  common.GuildNameplate guild_nameplate = 9; // 公会铭牌
  // vip等级
  int32 vip_level = 10;
  // 合伙人头衔
  string sub_guild_medal = 11;
  int64 receiver_id = 12; // 礼物接收者ID
  string receiver_nick = 13; // 礼物接收者昵称
  string receiver_icon = 14; // 礼物接收者头像
  int64 gift_num = 15; // 礼物数量
  uint32 wealth_level = 16;
  int64 charm_level = 17;//发送者魅力等级
  common.SexType sex = 18; //性别
  common.SexType receiver_sex = 19; //礼物接收者头像性别
  string PrankEnumContent = 20;  // 整蛊菜单内容
  int64 gift_total = 21; // 礼物总数量（新版，不用和gift_num相乘）
  bool open_mystery = 22; //是否是神秘人
  bool receive_open_mystery = 23; //接收者是否是神秘人
}

service GiftExtObj_gift {//12000 ---- 12100
  rpc Present_12000 (GiftPresentReq) returns (GiftPresentRes);                    // 普通赠送
  rpc BatchPresent_12001 (GiftBatchPresentReq) returns (GiftPresentRes);           // 批量赠送
  rpc GetGiftConfig_12002 (GiftConfigReq) returns (GiftConfigRes); 	// 获取礼物配置
  //rpc GetGiftDynamic_12005 (GiftDynamicReq) returns (GiftDynamicRes);   // 获取动态礼物信息
  rpc GetRoomGift_12007 (GiftRoomGiftReq) returns (GiftRoomGiftRes); 	// 房间礼物
  //购买礼物
  rpc BuyGift_12009 (BuyGiftReq) returns (BuyGiftRes);
}

