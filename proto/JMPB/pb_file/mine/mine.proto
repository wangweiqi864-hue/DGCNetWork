enum PlayerFlags {
  PF_ZERO = 0;
  PF_SET_BASE_INFO_OK = 1;//设否设置基本信息
  PF_IF_SEX_SELECTED = 2;//已选择性别
  PF_IF_COUNTRY_SELECTED = 3;//已设置国家
  PF_Greet = 4; // 是否接引人
  PF_Hide = 5;//是否隐身
  PF_PWD_ROOM = 6;//是否无视密码房
  PF_UNKick   = 7;//是否抗被踢
  PF_SCREENSHOT = 8; // 是否允许截图
}

// 玩家信息
message Player {
  sint64 id = 1; // 游客ID<=0
  string nickname = 2;
  common.SexType sex = 3;
  sint64 id2 = 4; // 靓号. ==0时没有
  string icon = 5; // 图标
  sint64 flags = 6; // 标志，按位存储。各位表示意思参考PlayerFlags
  sint64 flags2 = 30; // 标志，按位存储。各位表示意思参考PlayerFlags_2
  sint64 charm = 8;
  sint32 charmLevel = 15; // 魅力等级
  sint32 wealthLevel = 32; // 财富等级
  sint32 wealth = 9; // 财富值
  uint32 online_exp = 10; // 在线经验
  uint32 createAt = 11; // 注册时间
  bool has_passwd = 12; // 是否有密码
  bool is_phone = 13; // 是否是手机号注册
  sint32 flowerLevel = 33; // 浇花等级
  sint64 flower = 34; //浇花值
  bool is_online = 35;//是否在线
  map<int32, int32> flags_kv = 36; //标记, key-value存储, key:参考 enum PlayerFlagKey{}, value:参考key对应的enum{}
  bool cs_agent = 40; // 是否为客服
  string id2Icon = 41; // 靓号图标, 对应id2字段
  int32 vip_level = 42; // vip等级
}

message UserInfo {
  sint64 user_id = 1;
  string city = 2;
  string signature = 3;  // 签名
  string birthday = 4;   // 生日
  sint32 intimate_slot = 5;  // 挚友位数
  string mind = 6;       // 心声
  sint32 short_id_slot = 7;   // 靓号槽数
  string constellation = 8;  //星座
  string voice_url = 9;
  //年龄
  int32 age = 10;
  int32 country_code = 11; // 国家通讯码码
  string chose_cc = 12;//国家代码
  int32 voice_time = 13;// 声鉴卡长度
}

enum PUserKey {
	PU_Zero = 0;
	PU_Name = 1;//昵称
	// PU_CITY = 2;//城市
	PU_SIGN = 3;//签名
	PU_Birth = 4;//生日
	PU_CC = 5;//国家
	// PU_Mind = 6;//
	PU_SEX 	= 7;//性别
}

message PUserProperty {
		PUserKey key = 1;
		string  str_value = 2;
		int32  in_value = 3;
}

message UserInfoV2Req {
	repeated PUserProperty data = 1;
}

message UserInfoV2Res {

}



message QueryIslamicPrayerTimesReq {
  double latitude = 1; // 维度
  double longitude = 2; // 经度
  string timezone = 3; // 时区，例如Asia/Jakarta，Asia/Shanghai

  //（第二版新加功能）翻页基准日期（格式：yyyyMMdd），用来上下翻页使用，返回大于或者小于该时间的日期列表，为空表示使用当前时间
  string paging_day = 4;
  //（第二版新加功能）翻页方向，0:前后都要 1: 前翻 2:后翻
  int32 paging_direction = 5;
}

message IslamicPrayerTimes {
  enum PrayerType {
    None = 0;
    Fajr = 1;     //晨礼
    Sunrise = 2;  //日出时间
    Zuhr = 3;     //晌礼
    Asr = 4;      //晡礼
    Maghrib = 5;  //昏礼
    Isha = 6;     //宵礼
  }
  message PrayerTime {
    PrayerType type = 1;
    int32 time = 2;      //时间戳
    string name = 3;
  }

  repeated PrayerTime prayer_times = 1;

  // 伊斯兰历日期（第二版新加功能）
  string hijrian_date = 2;
  string date = 3; // 公历日期
}

message QueryIslamicPrayerTimesRes {
  string hijrian_date = 1;         //伊斯兰历日期
  IslamicPrayerTimes today = 2;    //今天
  IslamicPrayerTimes tomorrow = 3; //明天
  IslamicPrayerTimes.PrayerType current_type = 4; // 当前礼拜

  //（第二版新加功能）向前N天的礼拜时间
  repeated IslamicPrayerTimes prev_days = 5;
  //（第二版新加功能）向后N天的礼拜时间
  repeated IslamicPrayerTimes next_days = 6;
  //（第二版新加功能）基准日期（paging_day）的礼拜时间
  IslamicPrayerTimes base_day = 7;
}

