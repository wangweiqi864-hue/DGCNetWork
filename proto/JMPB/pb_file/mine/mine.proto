}

enum RelationshipStatus {
  // 等待对方确认
  RS_PENDING    = 0;
  // 已绑定（生效中）
  RS_ACTIVE     = 1;
  // 解绑处理中
  RS_UNBINDING  = 2;
  // 已解除
  RS_UNBOUND    = 3;
  // 已拒绝
  RS_REJECTED   = 4;
  // 已过期
  RS_EXPIRED    = 5;
}

