message HideRelationshipRes{
}


message QueryInvitationLetterReq{
  int64 invite_id = 1;
}

message QueryInvitationLetterRes{
  Player inviter = 1;
  Player invitee = 2;
  RelationshipType type = 3;
  // 关系状态，取值：等待接受、已接收、已拒绝、已过期
  RelationshipStatus status = 4;
  // 信物名称
  string token_name = 5;
  // 信物金币
  int32 token_gold = 6;
  // 信物图标
  string token_icon = 7;
}

message GetRelationshipConfigReq{

}
message GetRelationshipConfigRes{
  // cp爱心。等级->资源
  map<int32, string> cp_love = 1;
  // cp秀。等级->资源
  map<int32, string> cp_show = 2;
  // cp上麦特效
  string cp_mic_effect = 3;
  // cp上麦特效（镜像）
  string cp_mic_effect_mirror = 4;
}

// 查询cp情侣连续点亮鲜花天数
message QueryCpFlowerLightDaysReq {
  // 用户id1
  int64 uid1 = 1;
  // 用户id2
  int64 uid2 = 2;
}

message QueryCpFlowerLightDaysRes {
  // 是否是情侣
  bool is_cp = 1;
  // 连续点亮鲜花天数
  int32 days = 2;
  // 今天是否有送礼
  bool has_send_gift_today = 3;
}

// cmd=500032
message CpFlowerLightDaysChangeEvent {
  // 用户id1
  int64 uid1 = 1;
  // 用户id2
  int64 uid2 = 2;
  // 当前连续点亮鲜花天数
  int32 days = 3;
}