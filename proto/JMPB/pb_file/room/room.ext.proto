  string RoomFrameIcon = 11;  // 房间封面框  -- 替换用
}

message RoomPlayConfReq{

}

message RoomPlayConfRes{
  message conf {
    int32 Id = 1; // 房间模式
    string Name = 2; // 房间名称
    string Icon = 3; // 房间图标
    int32 PlayCategory = 4; // 玩法分类
    // PlayCategory  @see pb.RoomPlayCategory 玩法分类
	//	0:房间玩法（娱乐拍拍，欢乐PK，跨房PK等，在RoomPattern中定义，对应的PlayType为房间模式）
	//	1:街机游戏（摩天轮，捕鱼游戏等，对应的PlayType为H5游戏）
	//	2:休闲游戏（怪物消消乐，Ludo游戏等，在RoomPattern中定义，对应的PlayType为房间模式）
	//	3:互动类型（真心话大冒险等，在RoomPattern中定义，对应的PlayType为房间模式）
	//  4:基础房型（基础模式，明星模式）
	//  5:通用Sud游戏游戏（和“休闲游戏”放在一个tab）

//
//    string gameUrl = 4; // 房间地址
//    string gameBanner = 5; // 房间Banner图片
//    sint32 start_hour   = 6;//开放时间
//    sint32 end_hour     = 7;//结束时间
  }
  repeated conf confList = 1;
}

service RoomExtObj_room {

   // 直播面板数据
  rpc QueryLiveRoomPanelData_30056(QueryLiveRoomPanelDataReq) returns(QueryLiveRoomPanelDataRes);
   // 直播结算
  rpc QueryLiveRoomFinalData_30082(QueryLiveRoomFinalDataReq) returns(QueryLiveRoomFinalDataRes);

}