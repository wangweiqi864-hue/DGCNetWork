syntax = "proto3";

option objc_class_prefix = "PB3";

package pb;
import "common/common.proto";
import "room/room.proto";
enum LiveRoomPanelDataType {
  LiveRoomPanelDataType_None = 0;
  // 直播时长(单位秒)
  LiveRoomPanelDataType_LiveDuration = 1;
  // 总观看人数
  LiveRoomPanelDataType_UniqueVisitor = 2;
  // 新增关注
  LiveRoomPanelDataType_FollowCount = 3;
  // 钻石收入
  LiveRoomPanelDataType_DiamondIncome = 4;
  // 有效上麦新用户
  LiveRoomPanelDataType_ValidSeatNewUser = 5;
  // 有效在房新用户
  LiveRoomPanelDataType_ValidRoomNewUser = 6;

  //   直播下播页 新增
  // 开始时间
  LiveRoomPanelDataType_StartTime = 7;
  // 结束时间
  LiveRoomPanelDataType_StopTime = 8;
  // 最高在线人数
  LiveRoomPanelDataType_Pcu = 9;

  // 进房人数
  LiveRoomPanelDataType_EnterRoomCountNew = 10;
  LiveRoomPanelDataType_EnterRoomCountAll = 11;
  // 评论（发公屏）人数
  LiveRoomPanelDataType_ScreenChatCountNew = 12;
  LiveRoomPanelDataType_ScreenChatCountAll = 13;
    // 人均停留时长
  LiveRoomPanelDataType_StayRoomSecondAvgNew = 14;
  LiveRoomPanelDataType_StayRoomSecondAvgAll = 15;
    // 上麦人数
  LiveRoomPanelDataType_OnMicCountNew = 16;
  LiveRoomPanelDataType_OnMicCountAll = 17;
  // 在房3分钟人数
  LiveRoomPanelDataType_StayRoomThreeMinuteCountNew = 18;
  LiveRoomPanelDataType_StayRoomThreeMinuteCountAll = 19;
    // 在房3分钟人数
  LiveRoomPanelDataType_GiftCountNew = 20;
  LiveRoomPanelDataType_GiftCountAll = 21;


  // 推荐页展示人数
  LiveRoomPanelDataType_RecommendShowCountAll = 22;
  // 推荐页进房人数
  LiveRoomPanelDataType_RecommendEnterCountAll = 23;
  // 推荐页进房率
  LiveRoomPanelDataType_RecommendEnterRate = 24;
}

enum LiveRoomPanelDataGroupType {
  LiveRoomPanelDataGroupType_None = 0;
  // 实时数据
  LiveRoomPanelDataGroupType_RealTimeData = 1;
  // 考核数据
  LiveRoomPanelDataGroupType_AssessmentData = 2;
  // 结算数据
  LiveRoomPanelDataGroupType_FinalData = 3;
}

message LiveRoomPanelDataGroup {
  LiveRoomPanelDataGroupType type = 1;
  repeated LiveRoomPanelDataItem list = 2;
}

message LiveRoomPanelDataItem {
  LiveRoomPanelDataType type = 1;
  string value = 2;
}

message QueryLiveRoomPanelDataReq {

}

message QueryLiveRoomPanelDataRes {
  repeated LiveRoomPanelDataGroup list = 1;
}

message QueryLiveRoomFinalDataReq {
}

message QueryLiveRoomFinalDataRes {
  repeated LiveRoomPanelDataGroup list = 1;
}

message PrankEnumInfo{
  int64 gift_id = 1;
  string gift_name = 2; // 更新的时候这个不用发
  int64 gift_price = 3;
  string content = 4;
  string icon = 5; // 更新请求的时候这个不用发
}

message PrankEnumReq {
  int64 playerId = 1; //房主id（|自己id透传）
}

message PrankEnumRes {
  repeated PrankEnumInfo list = 1;
  int64 OpenStatus = 2; // 0-未开启 1-开启
  int64 PrankEnumLimitLen = 3;
}

message PrankEnumUpdateReq {  // 更新(开启时不可更新)
  repeated PrankEnumInfo list = 1;


}
message PrankEnumUpdateRes {
  int32 code = 1; // 0- 成功 1-菜单失效（谈提示即可，菜单服务端自动清除清除）
}
message PrankOptionReq {
  int32 option = 1; // 1- 开启 2-关闭
}

message PrankOptionRes {
   int32 code = 1; // 0- 成功 1-菜单失效（谈提示即可，菜单服务端自动清除清除）
}

enum RedEnvelopeType {
  NORMAL = 0; // 占位
  Gold = 1; // 金币福袋
  Gift = 2; // 礼物福袋
}

message QueryRedEnvelopeConfReq {}

message QueryRedEnvelopeConfRes {
  repeated int32 bag_number_options = 1; // 福袋数量选项
  repeated int32 period_options = 2; // 福袋有效期选项，单位分钟
  repeated int32 gold_number_options = 3; // 金币数量选项
  repeated int32 gift_number_options = 4; // 礼物数量选项
  message GiftInfo {
    string key = 1; // 礼物id
    int32  price = 2; // 礼物单价（以金币计价）
    string icon = 3; // 礼物图标
  }
  repeated GiftInfo gift_options = 5; // 礼物信息
  bool is_open = 6; // 是否开启入口
}

// 福袋的金额/礼物分配方式
enum AllocationType{
  Average = 0; // 平均分配
  Random =1; // 随机分配
}

// ClaimType 福袋领取范围
enum ClaimType{
  All = 0; // 所有人
  OnMic = 1; // 仅限上麦用户领取
}

message SendRedEnvelopeReq{
  RedEnvelopeType type = 1;
  AllocationType allocation_type = 2;
  int32 bag_number = 3; // 福袋数量
  int32 bag_gold = 4; // 福袋金币，金币福袋时配置
  string bag_gift_key = 5; // 福袋礼物，礼物福袋时配置
  int32 bag_gift_num = 6; // 礼物数量，礼物福袋时配置
  int32 period = 7; // 福袋有效期
  string password = 8; // 福袋口令。服务端不设置默认口令，如果用户不设置，客户端也要把默认口令传过来
  ClaimType claim_type = 9; // 福袋领取范围
}

message SendRedEnvelopeRes{
  int32 code = 1; // 0-发送成功，1-金币不足，2-锁房状态不能发
}

message QueryRedEnvelopeSendReq{
  // 分页查询
  int64 page = 1;
  int64 size = 2;
}

message QueryRedEnvelopeSendRes{
  message Record{
    int64 record_id = 1; // 送出记录id
    RedEnvelopeType type = 2;
    AllocationType allocation_type = 3;

    int64 gold_total = 4; // 福袋金币总数（金币福袋时有效），不再使用
    int64 gift_num = 7; // 礼物总数量（礼物福袋时有效），不再使用

    string gift_key = 5; // 礼物key（礼物福袋时有效）
    string gift_icon = 6; // 礼物icon（礼物福袋时有效）
    int64 send_time = 8; // 送出时间，unix时间戳
    int64 bag_total = 9; // 福袋总数
    int64 received_bag = 10; // 已领取福袋数
    int64 received_total = 11; // 被领取的总金币数/被领取的总礼物数
  }
  repeated Record records = 1;
  int64 total = 2;
}

message QueryRedEnvelopeSendDetailReq{
  int64 record_id = 1; // 送出记录id
}

message QueryRedEnvelopeSendDetailRes{
  message ReceivedInfo{
    int64 user_id = 1; // 领取人用户id
    string nickname = 2; // 领取人用户昵称
    string avatar = 3; // 领取人用户头像
    string gift_key = 4; // 礼物key（礼物福袋时有效）
    string gift_icon = 5; // 礼物icon（礼物福袋时有效）
    int32 receive_amount = 6; // 领取的金币数/礼物数
    int64 receive_time = 7; // 领取时间，unix时间戳
  }
  int64 user_id = 1; // 用户id
  string nickname = 2; // 用户昵称
  string avatar = 3; // 用户头像
  string password = 4; // 领取口令
  RedEnvelopeType type = 5;
  AllocationType allocation_type = 6;
  int32 bag_total = 7; // 福袋总数
  int32 received_bag = 8; // 已领取福袋数
  int32 received = 9; // 已领取金币数/礼物数
  int32 total = 10; // 总的金币数/礼物数
  repeated ReceivedInfo received_info = 11; // 领取情况
}

message QueryRedEnvelopeReceiveReq{
  // 分页查询
  int64 page = 1;
  int64 size = 2;
}


// cmdId = 110030
message ReceiveRedEnvelopeEvent{
  RedEnvelopeType type = 1; // 福袋类型
  string send_nickname = 2; // 发送者昵称
  string receiver_nickname = 3; // 领取人用户昵称
  int64 receive_amount = 4; // 领取到的金币数 or 礼物数
  string gift_name = 5; // 礼物名称（礼物福袋时有效）
  int64 receive_time = 6; // 领取时间
}

message QueryRedEnvelopeReceiveRes{
  message Info{
    string nickname = 1; // 发送者用户昵称
    int64 receive_time = 2; // 领取时间，unix时间戳
    RedEnvelopeType type = 3;
    AllocationType allocation_type = 4;
    string gift_key = 5; // 礼物key（礼物福袋时有效）
    string gift_icon = 6; // 礼物icon（礼物福袋时有效）
    int32 receive_amount = 7; // 领取的金币数/礼物数
  }
  repeated Info received_info = 1;
  int64 total = 2;
}

message QueryAvailableRedEnvelopeReq{
}

message QueryAvailableRedEnvelopeRes{
  message AvailableRedEnvelopeInfo{
    int64 bag_id = 1; // 福袋id
    int64 expiration = 2; // 结束倒计时（秒）
    int64 sender_id = 3; // 福袋发送者id
    string nickname = 4; // 福袋发送者昵称
    string avatar = 5; // 福袋发送者头像
    bool show = 6; // 是否显示发送人的头像和昵称
  }
  repeated AvailableRedEnvelopeInfo list = 1; // 可领取的福袋队列，最先过期的排在前面
}

message QueryRedEnvelopeInfoReq{
  int64 bag_id = 1; // 福袋id
}

message QueryRedEnvelopeInfoRes{
  int64 bag_id = 1; // 福袋id
  int64 expiration = 2; // 结束倒计时（秒）
  int64 sender_id = 3; // 福袋发送者id
  string nickname = 4; // 福袋发送者昵称
  string avatar = 5; // 福袋发送者头像
  int32 bag_number = 6; // 福袋数量
  int32 received_amount = 7; // 已领取数量
  string password = 8; // 口令
  ClaimType claim_type = 9; // 领取范围
}

message ReceiveRedEnvelopeReq{
  int64 bag_id = 1; // 福袋id
}

message ReceiveRedEnvelopeRes{
  message ReceiveInfo{
    int64 receiver_id = 1; // 领取者id
    string nickname = 2; // 领取人用户昵称
    int64 receive_time = 3; // 领取时间，unix时间戳
    int64 receive_amount = 4; // 领取的金币数/礼物数
    string gift_key = 5; // 礼物key（礼物福袋时有效）
    string gift_icon = 6; // 礼物icon（礼物福袋时有效）
    string avatar = 7; // 领取人头像
    string gift_name = 8; // 礼物名称（礼物福袋时有效）
  }
  int32 code = 1; // 1-领取成功 2-福袋已被领取完。福袋过期通过error返回
  int64 sender_id = 2; // 发送者id
  string nickname = 3; // 发送者昵称
  string avatar = 4; // 发送者头像
  int32 bag_total = 5; // 福袋数量
  int32 received_bag_amount = 6; // 已领取的福袋数量
  int64 available = 7; // 可领取的金币总数（或者是礼物总数）
  int64 received = 8; // 已领取的金币数量（或者是礼物数量）
  ReceiveInfo me = 9; // 我领取的福袋信息（如果福袋领取完，则返回空）
  repeated ReceiveInfo list = 10; // 其他人的领取信息
  RedEnvelopeType type = 11; // 福袋类型
  AllocationType allocation_type = 12; // 福袋分配类型
}

//cmdid 110028
message PrankEnumInfoPush {   // todo 注意，如果是后台关闭的话，只会返回这个，没有PrankOption_30089 返回
  repeated PrankEnumInfo list = 1;
  int64 OpenStatus = 2; // 0-未开启 1-开启
}

