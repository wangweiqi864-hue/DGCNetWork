enum VoiceSdkType {
  VST_NONE = 0;        //占位不使用
  VST_TENCENT = 1;     //腾讯sdk
  VST_AGORA = 2;       //声网sdk
  VST_BYTEDANCE = 3;  //火山
}

message RtcInfo {
  string app_id = 1;
  VoiceSdkType sdk_type = 2;
  // 推拉流Token
  string token = 3;
}


