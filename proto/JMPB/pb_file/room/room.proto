enum RoomPlayCategory {
  RoomPlayCategoryBasic = 0;   //基础房间游戏（娱乐拍拍，欢乐PK，跨房PK等）
  RoomPlayCategoryArcade = 1;  //街机游戏（摩天轮，捕鱼游戏等）
  RoomPlayCategoryCasual = 2;  //休闲游戏（怪物消消乐，Ludo游戏等）
  RoomPlayCategorySports = 3;  //互动类型
  //通用Sud游戏（和RoomPlayCategoryCasual放在一个tab）
