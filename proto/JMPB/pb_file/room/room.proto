message TrueTalkOptReq{
  int64 opt = 1; // 1. 开始游戏 （管理员） 2. 玩家选择挑战 （被选中的玩家） 3. 下一局游戏 （管理员） 4，结束游戏（管理员） 5 获取游戏状态

  repeated int64 player_id  = 2; // 开始游戏时 传参加的玩家ID

  int32 challenge_id = 3; // 1 真心话 2 大冒险
  int64 room_id = 4;
}

message TrueTalkOptRes{
    TrueTalkNotify res = 1; // 只有请求操作为5时才会返回
}

// 推送ID 110017 真心话推送
message TrueTalkNotify{
  int32 currency_step = 1; // 当前步骤 1 初始化  2 随机选中玩家 3 玩家选择挑战 4 等待玩家挑战  （1 状态 只会存在开始游戏  管理员选择下一距状态会直接选择到2）  5游戏
  TrueTalkPlayerInfo player_id = 2; // 玩家ID
  repeated TrueTalkPlayerInfo join_player = 3;
  string question = 5; // 问题或者大冒险文案
  int64 total_round = 6; // 总局数
  int64 current_round = 7;
  int32 end = 8; // 1 结束游戏 2 提前结束 （当current_round == 5 时，才有效果）
  int32 game_select = 9;
  int32 start_time = 10;
  int32 duration = 11;
  int64 round_progress = 12;
  int64 operator = 13;       // 操作人（游戏开启的通知有效）
  string operator_name = 14; // 操作人昵称（游戏开启的通知有效）
}


message TrueTalkPlayerInfo{
  int64 player_id = 1; // 玩家ID
  string player_name = 2; // 玩家名
  string icon = 3; // 头像
  common.SexType sex = 4; // 性别
}

// 推送ID 110018 大冒险选择推送
message TrueTalkChallengeNotify{
  int32 event = 1; // 1 选择推送 2 用户逃离
  int32 game_select = 2;
  TrueTalkPlayerInfo player_id = 3; // 玩家ID
}

// cmdId=110020，广播房间子模式变更
message BroadcastRoomSubPatternChange {
  // 当前房间正在开启的子模式（值：RoomPattern）
  repeated int32 sub_pattern_list = 1;
}

message GetRoomBgReq{}
message GetRoomBgRes{
 repeated RoomBgItem room_bg_list = 1;
}
message RoomBgItem {
  string room_bg = 1;  // 资源图片
  string room_bg_cover = 2; // 房间背景缩略图
  int32 room_bg_id = 3; // 房间背景id
  RoomPattern room_bg_pattern = 4; //鲸鸣当前使用房间模式，背景允许使用的房间模式
  RoomType room_bg_type = 5;//房间类型,背景允许使用的房间类型
  int64 end_time = 6; // 以秒为单位的时间戳，-1，代表永久有效
  RoomDecorateType room_decorate_type = 7;  // 房间背景类型
  string room_bg_name = 8; // 房间背景图名字
  int32 weight = 9; // 权重
  repeated RoomPattern room_bg_pattern2 = 10; // room_bg_pattern 和 room_bg_pattern2 互斥
  // 自定义主题的审核状态。0-审核中，1-通过，2-不通过
  int32 status = 11;
}

// 更换房间背景
message ChangeRoomBgReq {
  int64 room_id = 1;
  int32 room_bg_id = 2;
}
message ChangeRoomBgRes{}

message  BroadcastUseDecorate{
  int64 id = 1; // 房间背景图id
  string url = 2; // 房间背景图url
}

enum RoomDecorateType {
  RoomDecorateType_None = 0; // 普通背景
  RoomDecorateType_Belong = 1; // 专属背景
