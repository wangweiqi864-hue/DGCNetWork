}

message RoomPlayItem {
  RoomPattern mode = 1;
  string mode_name = 2;
  string mode_icon = 3;
  // 剩余秒数,大于0则有权限
  // int32 valid_time = 4;
  // 是否永久
  // bool is_permanent = 5;
  // 介绍
  // string mode_intr = 6;
  // 是否锁定
  // bool is_lock = 7;
  // 需要的等级
  // int32 need_level = 8;
  // 模式开启开放时间段，open_close_ranges为空或者当前时间符合open_close_ranges其中任何一个，就说明该模式当前可用
  // repeated OpenCloseRange open_close_ranges = 9;
  // 玩法分类
  RoomPlayCategory play_category = 10; //@see RoomPlayCategory
  // 路由
  string route = 11;
  // 玩法Id（如果玩法是房间模式，play_id和mode字段相同）
  int32 play_id = 12;
  // sud游戏Id
  string sud_game = 13;
  // sud游戏高度
  int32 sud_game_height = 14;
}

message RoomPlayListRes {
  repeated RoomPlayItem items = 1;
}

