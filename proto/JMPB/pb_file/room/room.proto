// 房间篝火发生变动 110001
message BroadcastMangoRoomBonfireChange  {
  int32 bonfire_level = 1;
}

// 用户篝火发生变动 110002
message BroadcastMangoRoomUserBonfireChange  {
  int64 player_id = 1;
  // 篝火数
  int64 bonfire_num = 2;
  // 下一次篝火+1剩余时间 单位s
  int64 bonfire_residual_time = 3;
}

// 广播有人进房间
// cmdId=100001
message BroadcastPlayerEnter {
  LivePlayer player = 1;
  uint32 viewer_num = 2;  // 房间总人数
  int64 follow_id = 3;    //跟随id
  string follow_name = 4; //跟随昵称
  int32 follow_type = 5;  // 跟随类型，默认为0=原来跟随进来，1=xxx被xxx接引进来, 2=xxx在广播交友跟随xxx的脚步进入房间
  string follow_msg = 6;  // 跟随语 %enter_name%-进入者  %follow_name%-被跟随者 %mod_name%-模块名 %enter_name%被%follow_name%接引进来,
  // 在线列表前3头像(前3有变化才带上)
  repeated string icons = 7;
  
  bool has_cp_or_friend = 8;
  // 仅has_cp_or_friend为true时，以下字段有值
  // 关系类型
  mine.RelationshipType type = 9;
  // cp/朋友id
  int64 partner_id = 10;
  // cp/朋友昵称
  string partner_nickname = 11;
  // cp/朋友头像
  string partner_avatar = 12;
  // 关系等级
  int32 level = 13;
  
}

// 广播有人离开房间
// cmdId=100002 LongVO 玩家Id
message BroadcastPlayerLeave {
  sint64 room_id = 1;
  sint64 player_id = 2;
  string name = 3;
  // 房间总人数
  int32 viewer_num = 4;
  // 在线列表前3头像(前3有变化才带上)
  repeated string icons = 5;
}

// 用户投掷篝火 110003
message BroadcastMangoRoomUserThrowBonfire {
  int64 player_id = 1;
  string nickname = 2;
  string icon = 3;
  int32 bonfire_num = 4;
  common.SexType sex = 5;
}

// 广播聊天
message BroadcastChat {
  ChatReq chat = 2;
  sint32 at_time = 3; // 发送时间

  // 发送者信息
  sint64 player_id = 1;
  string name = 4;
  int32 wealth_level = 5;
  int32 charm_level = 6;
  sint64 flags = 7;
  sint64 flags2 = 8;
  bool is_charge = 9;
  repeated common.Effect effect = 10; //特效
  bool is_new_user = 11;       // 是否新人
  sint64 id2 = 12;        // 靓号
  string headerIcon = 13;        // 头像
  //ChatNobilityInfo nobility_info = 14;
  repeated int64 usersPrivilegeId = 17; // 用户特权ID
  common.GuildNameplate guild_nameplate = 18; // 公会铭牌
  // vip等级
  int32 vip_level = 19;
  // 合伙人头衔
  string sub_guild_medal = 20;
  // 性别
  common.SexType sex = 21;
  // 神秘人
  bool open_mystery = 22;
}


// 用户点赞110004
message BroadcastMangoRoomLike {
  int64 like = 1;
}



// 视频设备开关
message VideoDeviceSwitch {
  // 摄像头状态，ture为打开
  bool is_camera_on = 3;
  // 麦克风状态，ture为打开
  bool is_microphone_on = 4;
}

message PreviewVideoReq {
}

message PreviewVideoRes {
  RtcInfo rtc_info = 1;
  // 房间标题
  string room_name = 2;
  // 视频设备状态
  VideoDeviceSwitch video_device_switch = 3;
}

message StartVideoReq {
  // 房间Id
  int64 room_id = 1;
  // 房间标题
  string room_name = 2;
  // 视频设备状态
  VideoDeviceSwitch video_device_switch = 3;
}

message StartVideoRes {
  // 进房回包，开始视频直播会走一遍进房逻辑
  EnterRoomRes enter_room_res = 1;
}

message SwitchCameraStatusReq {
  bool is_camera_on = 1;
  //状态变化原因
  CameraChangeReason reason =2;
}

message SwitchCameraStatusRes {

}

// cmdId=110010，广播摄像头状态
message BroadcastCameraStatus {
  int64 player_id           = 1;// 用户Id
  bool is_camera_on         = 2;
  //状态变化原因
  CameraChangeReason reason = 3;
  int64 roomId = 4; // 房间id; 之前的逻辑默认0
}

enum CameraChangeReason {
  CCR_Zero = 0;
  CCR_CLOSE = 1;
  CCR_BEAT = 2;
}

// cmdId=110011，广播房间模式切换
message BroadcastRoomPatternChange {
  RoomPattern pattern = 1;
  repeated Seat seats = 2;
  int64 playerId = 3;
  string Nickname = 4;
  string Icon = 5;
  // 媒体类型
  RoomType media = 6;
  // 切换前的模式
  RoomPattern old_pattern = 7;
  // 房间模式的名字，切换前后两个模式名字都在这里
  map<int32, I18nText> pattern_names = 8;
  // sud游戏Id（pattern=RoomPattern_RP_SudCommon有效）
  string sud_game = 9;
  // sud游戏高度（pattern=RoomPattern_RP_SudCommon有效）
  int32 sud_game_height = 10;
  int32 sud_game_playerId = 11;  // sud的模式id
  // sud游戏模式配置
  SudGameConfNew sud_game_conf = 12;
}

message SudGameConfNew {
  // 是否开启竞技模式
  bool is_bet = 2;
  // 下注金额
  int32 bet_amount = 3;
}

message I18nText {
  // key：语言，value：该语言对应的值
  map<string, string> values = 1;
}

message SetRoomMediaTypeReq{
    RoomType   media               =1;
    RoomPattern pattern = 2;
}

message SetRoomMediaTypeRes {

}

//切换媒体模式房间内广播 cmdId=110012
message BroadCastRoomMediaChange {
    RoomType media                 =1;
}


// 发送表情
message SendMicFaceReq {
  int32 micFaceId = 1; // 麦位表情资源URL
}

message SendMicFaceRes {
}

//CmdId=100199 // RC_RoomUseMacFace广播房间使用麦位表情
message MicFaceMessage {
  string      micFaceResUrl = 1; // 麦位表情资源URL
  int32       playerId = 2; // 发送玩家ID，用于寻找用户的状态（在麦？在房）
  string      nickName = 3; // 发送玩家昵称，XXX 发送了一个 ??? 表情
  string       micFaceName = 4; // 麦位表情名称，XXX 发送了一个 ??? 表情
  string      micFaceTypeCode = 5; // 麦位表情 类型 代码
  int32       resIndex = 6; // 资源的序号，当为随机表情时，指定到zip文件内部的第X序号的资源
  sint64       id2 = 7;
  repeated common.Effect effect = 8; //特效
  string header_icon = 9;
  bool isNewPlayer = 10;
  int32  WealthLevel = 11;
  int32  CharmLevel = 12;
  // 公会铭牌
  common.GuildNameplate guild_nameplate = 13;
  // vip等级
  int32 vip_level = 14;
  // 播放次数（小于等于1都认为是1次）
  int32 micFaceRepeatTimes = 15;
  // 表情结果
  string mic_result = 16;
  // 合伙人头衔
  string sub_guild_medal = 17;
  common.SexType sex = 18;
  // 神秘人
  bool open_mystery = 19;
}

//cmdId=110015
message BroadCastRoomTopChange {
  repeated bool rank_pos           = 1;//房间流水榜：是否日榜top1 ，是否周榜top1，是否月榜top1
}

